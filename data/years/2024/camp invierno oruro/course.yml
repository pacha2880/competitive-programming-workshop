id: camp-invierno-oruro-2024
title: Campamento de Programación de Invierno - Oruro 2024
year: 2024
status: published
description: >
  Campamento intensivo de 5 días organizado por HackLab Oruro, la Carrera de
  Ingeniería de Sistemas e Informática y el Centro de Estudiantes TUXSI.
  Impartido por Rodrigo Salguero (Pacha). Se cubrieron los temas fundamentales
  de la programación competitiva con una competencia de práctica cada día.

